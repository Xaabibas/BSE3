contrib=${lib}/ant-contrib-1.0b3.jar

comp.args=
comp.ver=17
vm.args=-XX:MaxHeapSize=1G -XX:MaxMetaspaceSize=256m
build.env=${build}/env
build.env.classes=${build.env}/classes
build.env.ar=${build.env}/${ant.project.name}
build.env.web.inf=${build.env.ar}/WEB-INF
