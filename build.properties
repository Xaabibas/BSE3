src.main=src/main
src.java=${src.main}/java
src.web=${src.main}/webapp
src.test=src/test/java
resources=${src.main}/resources
lib=lib

build=build
build.classes=${build}/classes
build.ar=${build}/${ant.project.name}
build.web.inf=${build.ar}/WEB-INF
